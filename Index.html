<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(-45deg, #f5f7fa, #e4ecff, #ffffff, #eef2ff);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* GLASS NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.3);
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 600;
    color: #4a6cf7;
}

/* LOGO IMAGE */
.logo img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    transition: 0.4s;
}

/* 3D HOVER */
.logo:hover img {
    transform: rotate(15deg) scale(1.2);
    box-shadow: 0 0 25px #4a6cf7;
}

/* MENU */
.menu a {
    margin-left: 25px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
    position: relative;
}

/* UNDERLINE ANIMATION */
.menu a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #4a6cf7;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

.menu a:hover::after {
    width: 100%;
}

/* MAIN */
.container {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* TITLE */
.title {
    font-size: 65px;
    font-weight: 600;
    color: #333;
    animation: fadeIn 1.5s ease;
}

/* COMING */
.coming {
    font-size: 30px;
    margin-top: 20px;
    color: #4a6cf7;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #4a6cf7; }
    to { text-shadow: 0 0 30px #4a6cf7; }
}

/* BUTTON */
.btn {
    margin-top: 35px;
    padding: 14px 35px;
    border-radius: 30px;
    background: linear-gradient(45deg, #4a6cf7, #6f8cff);
    color: white;
    text-decoration: none;
    font-size: 16px;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* SHINE EFFECT */
.btn::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    background: rgba(255,255,255,0.3);
    transform: rotate(45deg);
    left: -100%;
    top: 0;
}

.btn:hover::before {
    left: 100%;
    transition: 0.5s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #4a6cf7;
}

/* FADE */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

/* FLOATING BLOBS */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #4a6cf7;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 250px;
    height: 250px;
    background: #6f8cff;
    bottom: 10%;
    right: 10%;
}
</style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav>
    <div class="logo">
        <img src="baclogo.png" alt="logo">
        Eclipse Roleplay
    </div>

    <div class="menu">
        <a href="server.html">Server</a>
        <a href="discord.html">Discord</a>
        <a href="home.html">Contact Support</a>
    </div>
</nav>

<div class="container">
    <div class="title">Welcome to Eclipse RP Server</div>
    <div class="coming">🚀 Game Coming Soon...</div>

    <a href="https://discord.gg/YOUR-LINK" target="_blank" class="btn">
        Join Community
    </a>
</div>

</body>
</html>
