<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support | Eclipse Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #eef2ff, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease;
}

.title {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
}

input, textarea, select {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.2s;
}

input:focus, textarea:focus, select:focus {
    border-color: #4a6cf7;
    box-shadow: 0 0 10px rgba(74,108,247,0.2);
}

.counter {
    font-size: 12px;
    text-align: right;
    color: #888;
}

.btn {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg,#4a6cf7,#6f8cff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #4a6cf7;
}

.success {
    display: none;
    text-align: center;
    color: green;
    margin-top: 10px;
}

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    text-decoration: none;
    color: #4a6cf7;
}

@keyframes fadeIn {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
}
</style>

</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<div class="card">
    <div class="title">Support Center</div>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <input type="text" id="discord" placeholder="Your Discord Tag (username#1234)">

    <select id="type">
        <option value="">Select Issue Type</option>
        <option>Bug Report</option>
        <option>Player Report</option>
        <option>Ban Appeal</option>
        <option>Other</option>
    </select>

    <textarea id="message" rows="4" maxlength="600" placeholder="Describe your issue..."></textarea>
    <div class="counter" id="counter">0 / 600</div>

    <button class="btn" onclick="sendMsg()">Submit Ticket</button>

    <div class="success" id="success">✅ Ticket Sent Successfully!</div>
</div>

<script>

// ❌ RIGHT CLICK DISABLED
document.addEventListener('contextmenu', e => e.preventDefault());

// ❌ F12 + INSPECT BLOCK
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" ||
       (e.ctrlKey && e.shiftKey && e.key === "I") ||
       (e.ctrlKey && e.shiftKey && e.key === "J") ||
       (e.ctrlKey && e.key === "u")) {
        e.preventDefault();
    }
});

const msgBox = document.getElementById("message");
const counter = document.getElementById("counter");

msgBox.addEventListener("input", () => {
    counter.innerText = msgBox.value.length + " / 600";
});

function sendMsg(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const discord = document.getElementById("discord").value;
    const type = document.getElementById("type").value;
    const message = msgBox.value;

    if(!name || !email || !discord || !type || !message){
        alert("Please fill all fields!");
        return;
    }

    const webhookURL = "https://discord.com/api/webhooks/1486433529507090505/T5VmWikV_z9m0HmA4o5vSUXcxzmL07rE7UXLt-lHR1G_3oKp_cGH25dUwbAKK-I0bNYf";

    const data = {
        content: `🎫 **New Support Ticket**
        
👤 Name: ${name}
📧 Email: ${email}
🎮 Discord: ${discord}
📌 Type: ${type}

💬 Message:
${message}`
    };

    fetch(webhookURL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        document.getElementById("success").style.display = "block";
        msgBox.value = "";
        counter.innerText = "0 / 600";
    })
    .catch(() => alert("Error sending ticket"));
}

</script>

</body>
</html>
