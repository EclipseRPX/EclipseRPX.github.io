<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Eclipse RP Discord</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #ffffff, #e6ecff);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    background: white;
    padding: 50px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    animation: fadeIn 1.5s ease;
}

/* TITLE */
.title {
    font-size: 35px;
    font-weight: 600;
    color: #333;
}

/* TEXT */
.text {
    margin-top: 15px;
    font-size: 18px;
    color: #666;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 30px;
    border-radius: 25px;
    background: #5865F2;
    color: white;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #5865F2;
}

/* BACK BUTTON */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    text-decoration: none;
    color: #4a6cf7;
    font-weight: 500;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<div class="card">
    <div class="title">Join Our Discord</div>
    <div class="text">Be part of our community and stay updated 🚀</div>

    <!-- DISCORD BUTTON -->
    <a href="https://discord.gg/YOUR-LINK" target="_blank" class="btn">
        Join Discord
    </a>
</div>

</body>
</html>
