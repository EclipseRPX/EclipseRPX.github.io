<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:linear-gradient(-45deg,#eef2ff,#dbeafe,#ffffff,#e0f2fe);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 25px;
    background:white;
}

.menu a{
    margin-left:20px;
    text-decoration:none;
    color:#333;
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:50px;
    color:#4a6cf7;
}

.glow-btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 30px;
    border-radius:30px;
    background:#5865f2;
    color:white;
    text-decoration:none;
    box-shadow:0 0 15px rgba(88,101,242,0.5);
    transition:0.3s;
}

.glow-btn:hover{
    transform:scale(1.05);
}

/* TIMER */
.countdown{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.time{
    padding:15px;
    border-radius:15px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    min-width:80px;
}

.time span{
    font-size:22px;
    color:#4a6cf7;
}

/* STATS */
.stats{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:50px;
    text-align:center;
}

.stat h1{
    color:#4a6cf7;
    font-size:40px;
}

/* USERS */
.online-users{
    padding:50px;
    text-align:center;
}

.user-list{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.user-card{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 15px;
    border-radius:20px;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.user-card:hover{
    transform:scale(1.05);
}

.user-card img{
    width:40px;
    height:40px;
    border-radius:50%;
}

/* 📱 MOBILE OPTIMIZATION */
@media(max-width:768px){

.hero{
    padding:70px 15px;
}

.hero h1{
    font-size:32px;
}

.glow-btn{
    padding:10px 25px;
    font-size:14px;
}

.countdown{
    gap:10px;
    flex-wrap:wrap;
}

.time{
    padding:10px;
    min-width:70px;
}

.time span{
    font-size:18px;
}

.stats{
    flex-direction:column;
    gap:20px;
}

.user-list{
    flex-direction:column;
    align-items:center;
}

.user-card{
    width:90%;
    justify-content:flex-start;
}

nav{
    padding:12px 15px;
}

.menu a{
    margin-left:12px;
    font-size:14px;
}
}
</style>
</head>

<body>

<nav>
    <div><b>Eclipse RP</b></div>
    <div class="menu">
        <a href="server.html">Server</a>
        <a href="discord.html">Discord</a>
    </div>
</nav>

<section class="hero">
    <h1>Eclipse Roleplay</h1>
    <p>Launching Soon 🚀</p>

    <!-- DISCORD BUTTON -->
    <a href="https://discord.gg/RtZkYuzD" class="glow-btn">Get Early Access</a>

    <!-- TIMER -->
    <div class="countdown">
        <div class="time"><span id="days">00</span><p>Days</p></div>
        <div class="time"><span id="hours">00</span><p>Hours</p></div>
        <div class="time"><span id="minutes">00</span><p>Minutes</p></div>
        <div class="time"><span id="seconds">00</span><p>Seconds</p></div>
    </div>
</section>

<section class="stats">
    <div class="stat"><h1 id="p1">0</h1><p>Players</p></div>
    <div class="stat"><h1 id="p2">0</h1><p>Online Members</p></div>
    <div class="stat"><h1 id="p3">99</h1><p>Uptime %</p></div>
</section>

<section class="online-users">
    <h2>🟢 Online Members</h2>
    <div id="userList" class="user-list"></div>
</section>

<script>
const SERVER_ID = "1485946564898721943";

/* DISCORD DATA */
async function loadDiscordData(){
    try{
        const res = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
        const data = await res.json();

        document.getElementById("p1").innerText = data.presence_count;
        document.getElementById("p2").innerText = data.presence_count;

        const container = document.getElementById("userList");
        container.innerHTML = "";

        data.members.forEach(user => {

            let statusColor = {
                online: "#43b581",
                idle: "#faa61a",
                dnd: "#f04747"
            }[user.status] || "#747f8d";

            const card = document.createElement("div");
            card.className = "user-card";

            card.innerHTML = `
                <div style="position:relative;">
                    <img src="${user.avatar_url}">
                    <span style="
                        position:absolute;
                        bottom:0;
                        right:0;
                        width:10px;
                        height:10px;
                        background:${statusColor};
                        border-radius:50%;
                        border:2px solid white;
                    "></span>
                </div>
                <span>${user.username}</span>
            `;

            container.appendChild(card);
        });

    }catch(err){
        console.log("Discord Error:", err);
    }
}

loadDiscordData();
setInterval(loadDiscordData, 10000);

/* COUNTDOWN TIMER */
const launchDate = new Date("April 30, 2026 00:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let d = launchDate - now;

    document.getElementById("days").innerText = Math.floor(d/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((d%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerText = Math.floor((d%(1000*60))/1000);
},1000);

/* DISABLE INSPECT, RIGHT CLICK & F12 */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if(e.key === "F12" || 
       (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) || 
       (e.ctrlKey && e.key.toUpperCase() === "U")){
        e.preventDefault();
        alert("Inspecting is disabled on this page!");
    }
});
</script>

</body>
</html>
