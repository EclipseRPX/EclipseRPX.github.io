<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Eclipse Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

html, body{
    overflow-x:hidden;
    touch-action: pan-y;
}

body{
    background:linear-gradient(-45deg,#eef2ff,#dbeafe,#ffffff,#e0f2fe);
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    color:#111;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* NAVBAR */
nav{
    position:sticky;
    top:0;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.6);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    color:#4a6cf7;
}

.logo img{
    width:40px;
    border-radius:50%;
}

/* MENU */
.menu{
    display:flex;
}

.menu a{
    margin-left:25px;
    text-decoration:none;
    color:#333;
}

/* MENU BUTTON */
.menu-btn{
    display:none;
    font-size:28px;
    cursor:pointer;
    z-index:1200;
}

/* OVERLAY (FIXED) */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    backdrop-filter:blur(5px);
    background:rgba(255,255,255,0.1);
    opacity:0;
    pointer-events:none; /* IMPORTANT FIX */
    transition:0.3s;
    z-index:1050;
}

.overlay.active{
    opacity:1;
}

/* HERO */
.hero{
    text-align:center;
    padding:120px 20px;
    animation:float 4s ease-in-out infinite;
}

.hero h1{
    font-size:60px;
    color:#4a6cf7;
}

.hero p{
    margin-top:10px;
    opacity:0.7;
}

.glow-btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 35px;
    border-radius:30px;
    background:#4a6cf7;
    color:white;
    text-decoration:none;
    box-shadow:0 0 20px rgba(74,108,247,0.4);
    transition:0.3s;
}

.glow-btn:hover{
    transform:scale(1.05);
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.countdown{
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.time{
    padding:15px;
    min-width:80px;
    border-radius:15px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.time span{
    font-size:22px;
    color:#4a6cf7;
}

.features{
    padding:80px 20px;
    text-align:center;
}

.cards{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:260px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    transition:0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.stats{
    display:flex;
    justify-content:center;
    gap:50px;
    padding:60px 20px;
    text-align:center;
}

.stat h1{
    color:#4a6cf7;
}

.cta{
    text-align:center;
    padding:80px 20px;
}

/* MOBILE FIX */
@media(max-width:768px){

.hero h1{ font-size:38px; }

.menu-btn{
    display:block;
}

/* SIDEBAR */
.menu{
    position:fixed;
    top:0;
    right:-260px;
    width:260px;
    height:100vh;
    background:white;
    flex-direction:column;
    padding-top:80px;
    box-shadow:-5px 0 20px rgba(0,0,0,0.1);
    transition:0.4s ease;
    z-index:1100;
}

.menu.active{
    right:0;
}

.menu a{
    padding:18px 20px;
    border-bottom:1px solid #eee;
    margin:0;
}

.stats{
    flex-direction:column;
    gap:25px;
}
}
</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="baclogo.png">
        Eclipse RP
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="menu" id="menu">
        <a href="server.html">Server</a>
        <a href="discord.html">Discord</a>
        <a href="home.html">Support</a>
    </div>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<section class="hero">
    <h1>Eclipse Roleplay</h1>
    <p>Next-gen immersive RP experience</p>

    <a href="https://discord.gg/M2eFBYA9" class="glow-btn">Join Discord</a>

    <div class="countdown">
        <div class="time"><span id="days">00</span><p>Days</p></div>
        <div class="time"><span id="hours">00</span><p>Hours</p></div>
        <div class="time"><span id="minutes">00</span><p>Minutes</p></div>
        <div class="time"><span id="seconds">00</span><p>Seconds</p></div>
    </div>
</section>

<section class="features">
    <h2>🔥 Features</h2>
    <div class="cards">
        <div class="card">🎮 Realistic RP</div>
        <div class="card">🚓 Police System</div>
        <div class="card">💰 Economy</div>
    </div>
</section>

<section class="stats">
    <div class="stat"><h1 id="p1">0</h1><p>Players</p></div>
    <div class="stat"><h1 id="p2">0</h1><p>Members</p></div>
    <div class="stat"><h1 id="p3">0</h1><p>Uptime %</p></div>
</section>

<section class="cta">
    <h2>Join Our Community 🚀</h2>
    <a href="https://discord.gg/M2eFBYA9" class="glow-btn">Join Now</a>
</section>

<script>

// MENU TOGGLE
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

// DISABLE RIGHT CLICK
document.addEventListener('contextmenu', e => e.preventDefault());

// DISABLE INSPECT
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" ||
       (e.ctrlKey && e.shiftKey && e.key === "I") ||
       (e.ctrlKey && e.shiftKey && e.key === "J") ||
       (e.ctrlKey && e.key === "u")) {
        e.preventDefault();
    }
});

// COUNTDOWN
const launchDate=new Date("April 30, 2026 00:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let d=launchDate-now;

document.getElementById("days").innerText=Math.floor(d/(1000*60*60*24));
document.getElementById("hours").innerText=Math.floor((d%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerText=Math.floor((d%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerText=Math.floor((d%(1000*60))/1000);
},1000);

// STATS
function anim(id,end){
let i=0;
let el=document.getElementById(id);
let int=setInterval(()=>{
i+=Math.ceil(end/50);
if(i>=end){i=end;clearInterval(int);}
el.innerText=i;
},30);
}

anim("p1",120);
anim("p2",850);
anim("p3",99);

</script>

</body>
</html>
