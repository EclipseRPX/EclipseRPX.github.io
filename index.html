<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(-45deg, #f5f7fa, #e4ecff, #ffffff, #eef2ff);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
}

/* BACKGROUND */
@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.4);
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 600;
    color: #4a6cf7;
}

.logo img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    transition: 0.4s;
}

.logo:hover img {
    transform: rotate(15deg) scale(1.2);
    box-shadow: 0 0 20px #4a6cf7;
}

/* MENU */
.menu {
    display: flex;
}

.menu a {
    margin-left: 20px;
    text-decoration: none;
    color: #333;
    position: relative;
}

/* MOBILE MENU BUTTON */
.menu-btn {
    display: none;
    font-size: 26px;
    cursor: pointer;
}

/* UNDERLINE */
.menu a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #4a6cf7;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

.menu a:hover::after {
    width: 100%;
}

/* MAIN */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

/* TITLE */
.title {
    font-size: 50px;
    font-weight: 600;
}

/* COMING */
.coming {
    font-size: 24px;
    margin-top: 15px;
    color: #4a6cf7;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #4a6cf7; }
    to { text-shadow: 0 0 25px #4a6cf7; }
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 25px;
    border-radius: 25px;
    background: linear-gradient(45deg, #4a6cf7, #6f8cff);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #4a6cf7;
}

/* BLOBS */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
    z-index: -1;
}

.blob1 {
    width: 250px;
    height: 250px;
    background: #4a6cf7;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 200px;
    height: 200px;
    background: #6f8cff;
    bottom: 10%;
    right: 10%;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 768px) {

    nav {
        padding: 15px 20px;
    }

    .menu {
        position: absolute;
        top: 70px;
        right: 0;
        background: white;
        width: 200px;
        flex-direction: column;
        display: none;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        border-radius: 10px;
    }

    .menu a {
        padding: 15px;
        margin: 0;
        border-bottom: 1px solid #eee;
    }

    .menu-btn {
        display: block;
    }

    .title {
        font-size: 32px;
    }

    .coming {
        font-size: 18px;
    }
}
</style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<nav>
    <div class="logo">
        <img src="baclogo.png" alt="logo">
        Eclipse Roleplay
    </div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="menu" id="menu">
        <a href="server.html">Server</a>
        <a href="discord.html">Discord</a>
        <a href="home.html">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="title">Welcome to Eclipse RP Server</div>
    <div class="coming">🚀 Game Coming Soon...</div>

    <a href="https://discord.gg/YOUR-LINK" target="_blank" class="btn">
        Join Community
    </a>
</div>

<script>
function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
